apiVersion: v1
kind: Service
metadata:
  name: calculator-app-service
spec:
  selector:
    app: calculator-app
  ports:
    - protocol: TCP
      port: 80         # The port the service exposes inside the cluster
      targetPort: 8081 # The port your container is listening on
  type: ClusterIP      # Use 'LoadBalancer' if you are on cloud and want a public IP
