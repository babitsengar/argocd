apiVersion: apps/v1
kind: Deployment
metadata:
  name: calculator-app-deployment
  labels:
    app: calculator-app
spec:
  replicas: 2 # Runs two instances for high availability
  selector:
    matchLabels:
      app: calculator-app
  template:
    metadata:
      labels:
        app: calculator-app
    spec:
      containers:
      - name: calculator-app
        # Make sure this matches the image you pushed to your registry
        image: ghcr.io/babitsengar/calculator-app:1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
